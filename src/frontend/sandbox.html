<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generated page sandbox</title>
    <style>
      html,
      body,
      #generated-page {
        width: 100%;
        height: 100%;
        margin: 0;
        border: 0;
        background: white;
      }

      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <iframe
      id="generated-page"
      title="Generated interactive webpage"
      sandbox="allow-scripts"
      referrerpolicy="no-referrer"
    ></iframe>
    <script>
      const output = document.getElementById("generated-page");

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent) return;
        if (!event.data || event.data.type !== "internet-transformer:render") return;
        if (typeof event.data.html !== "string") return;

        output.srcdoc = event.data.html;
      });
    </script>
  </body>
</html>
